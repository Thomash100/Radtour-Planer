services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: radreise
      POSTGRES_PASSWORD: radreise
      POSTGRES_DB: radreiseplaner
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radreise -d radreiseplaner"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    command: sh -c "npx prisma generate && npx prisma db push && npx prisma db seed && npm run dev -- --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://radreise:radreise@postgres:5432/radreiseplaner?schema=public
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: sh -c "npx prisma generate && npm run worker"
    environment:
      DATABASE_URL: postgresql://radreise:radreise@postgres:5432/radreiseplaner?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
